<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Status dashboard — compact design variants</title>
    <style>
      :root {
        --bg: #0b0e13;
        --bg-raised: #12161f;
        --bg-inset: #0e1219;
        --border: #222836;
        --border-strong: #303a4e;
        --text: #e6ebf4;
        --text-dim: #8b95a8;
        --text-faint: #5c6474;

        --running: #4c8dff;
        --blocked: #f2555a;
        --done: #3ecf72;

        --running-bg: rgba(76, 141, 255, 0.13);
        --blocked-bg: rgba(242, 85, 90, 0.13);
        --done-bg: rgba(62, 207, 114, 0.13);

        font-family:
          "Inter",
          "SF Pro Text",
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(1200px 500px at 70% -10%, rgba(76, 141, 255, 0.06), transparent),
          var(--bg);
        padding: 24px 28px 60px;
      }

      /* ============ chrome around the variants ============ */

      .page-head {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-bottom: 6px;
      }

      .page-head h1 {
        font-size: 17px;
        font-weight: 650;
        margin: 0;
      }

      .page-head .sub {
        font-size: 13px;
        color: var(--text-dim);
      }

      .picker {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 16px 0 22px;
      }

      .picker button {
        font: inherit;
        font-size: 13px;
        color: var(--text-dim);
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg-raised);
        border-radius: 999px;
        padding: 6px 14px;
        transition:
          border-color 120ms ease,
          color 120ms ease;
      }

      .picker button:hover {
        border-color: var(--border-strong);
        color: var(--text);
      }

      .picker button.active {
        border-color: var(--running);
        color: var(--text);
        background: var(--running-bg);
      }

      .stage {
        display: flex;
        flex-wrap: wrap;
        gap: 26px;
        align-items: flex-start;
      }

      .frame-wrap {
        display: none;
        flex-direction: column;
        gap: 8px;
      }

      .frame-wrap.visible {
        display: flex;
      }

      .frame-title {
        font-size: 12px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-faint);
      }

      .frame-note {
        font-size: 12px;
        color: var(--text-dim);
        max-width: 360px;
        line-height: 1.5;
        margin-top: -2px;
      }

      /* the simulated small window */
      .window {
        width: 360px;
        height: 430px;
        border: 1px solid var(--border-strong);
        border-radius: 12px;
        background: var(--bg-inset);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      }

      .window .titlebar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-raised);
        flex-shrink: 0;
      }

      .window .titlebar .traffic {
        display: flex;
        gap: 5px;
      }
      .window .titlebar .traffic span {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #3a4150;
      }

      .window .titlebar .name {
        font-size: 11px;
        color: var(--text-faint);
        margin: 0 auto;
        letter-spacing: 0.03em;
      }

      .window .body {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      /* ============ shared bits inside variants ============ */

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot[data-s="running"] {
        background: var(--running);
      }
      .dot[data-s="blocked"] {
        background: var(--blocked);
      }
      .dot[data-s="done"] {
        background: var(--done);
      }

      .dot.pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
      .dot.throb {
        animation: throb 1.1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      @keyframes throb {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(242, 85, 90, 0.55);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(242, 85, 90, 0);
        }
      }

      /* quiet tally footer, shared across variants */
      .tally-foot {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 7px 12px;
        border-top: 1px solid var(--border);
        background: var(--bg-raised);
        font-size: 11px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
      }

      .tally-foot .t {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .tally-foot .t .dot {
        width: 6px;
        height: 6px;
      }

      .tally-foot .conn {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .tally-foot .conn .dot {
        width: 6px;
        height: 6px;
        background: var(--done);
      }

      /* ============ V1 — dense rows ============ */

      .v1-list {
        padding: 6px 0;
      }

      .v1-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        cursor: default;
      }

      .v1-row:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .v1-row .label {
        font-size: 13px;
        font-weight: 550;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .v1-row .reason {
        font-size: 11.5px;
        color: var(--blocked);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex-shrink: 1;
      }

      .v1-row .runtime {
        margin-left: auto;
        font-size: 11.5px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .v1-row[data-s="blocked"] {
        background: linear-gradient(90deg, var(--blocked-bg), transparent 65%);
      }

      .v1-row[data-s="done"] .label {
        color: var(--text-dim);
      }

      /* ============ V2 — grouped lanes ============ */

      .v2-lane-head {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 10px 14px 4px;
        font-size: 10.5px;
        font-weight: 650;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--text-faint);
      }

      .v2-lane-head .n {
        color: var(--text-dim);
      }
      .v2-lane-head .dot {
        width: 6px;
        height: 6px;
      }

      .v2-item {
        display: flex;
        align-items: center;
        gap: 9px;
        margin: 3px 10px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: default;
      }

      .v2-item:hover {
        border-color: var(--border-strong);
      }

      .v2-item .label {
        font-size: 13px;
        font-weight: 550;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .v2-item[data-s="blocked"] {
        background: var(--blocked-bg);
        border-color: rgba(242, 85, 90, 0.3);
      }

      .v2-item .reason {
        font-size: 11.5px;
        color: var(--blocked);
        margin-left: auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 55%;
      }

      .v2-item[data-s="done"] {
        opacity: 0.55;
      }

      .v2-item .runtime {
        margin-left: auto;
        font-size: 11.5px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
      }

      /* ============ V3 — chip grid ============ */

      .v3-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
      }

      .v3-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--border);
        background: var(--bg-raised);
        border-radius: 9px;
        padding: 9px 11px;
        cursor: default;
        min-width: 0;
      }

      .v3-chip:hover {
        border-color: var(--border-strong);
      }

      .v3-chip .label {
        font-size: 12.5px;
        font-weight: 550;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .v3-chip[data-s="blocked"] {
        border-color: rgba(242, 85, 90, 0.55);
        background: var(--blocked-bg);
      }

      .v3-chip[data-s="done"] {
        opacity: 0.55;
      }

      /* ============ V4 — tile matrix ============ */

      .v4-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 14px;
      }

      .v4-tile {
        aspect-ratio: 1;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: default;
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 650;
        letter-spacing: 0.02em;
      }

      .v4-tile[data-s="running"] {
        background: var(--running-bg);
        color: var(--running);
        border-color: rgba(76, 141, 255, 0.35);
      }

      .v4-tile[data-s="blocked"] {
        background: var(--blocked-bg);
        color: var(--blocked);
        border-color: rgba(242, 85, 90, 0.6);
        animation: tile-throb 1.4s ease-in-out infinite;
      }

      .v4-tile[data-s="done"] {
        background: rgba(62, 207, 114, 0.07);
        color: rgba(62, 207, 114, 0.6);
        border-color: rgba(62, 207, 114, 0.18);
      }

      @keyframes tile-throb {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(242, 85, 90, 0.4);
        }
        70% {
          box-shadow: 0 0 0 5px rgba(242, 85, 90, 0);
        }
      }

      .v4-tile:hover {
        filter: brightness(1.25);
      }

      .v4-tile .who {
        font-size: 9.5px;
        font-weight: 550;
        color: var(--text-faint);
        max-width: 90%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ============ V5 — statusbar / terminal ============ */

      .v5-body {
        font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
        font-size: 12px;
        padding: 10px 0;
      }

      .v5-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        cursor: default;
        white-space: nowrap;
      }

      .v5-row:hover {
        background: rgba(255, 255, 255, 0.035);
      }

      .v5-row .glyph {
        width: 14px;
        text-align: center;
        flex-shrink: 0;
      }
      .v5-row[data-s="running"] .glyph {
        color: var(--running);
      }
      .v5-row[data-s="blocked"] .glyph {
        color: var(--blocked);
        animation: pulse 1.1s ease-in-out infinite;
      }
      .v5-row[data-s="done"] .glyph {
        color: var(--done);
      }

      .v5-row .label {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .v5-row[data-s="done"] .label {
        color: var(--text-faint);
      }

      .v5-row[data-s="blocked"] {
        background: linear-gradient(90deg, var(--blocked-bg), transparent 70%);
      }

      .v5-row .reason {
        color: var(--blocked);
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 11px;
      }

      .v5-row .runtime {
        margin-left: auto;
        color: var(--text-faint);
        font-size: 11px;
      }

      /* ============ tooltip ============ */

      .tooltip {
        position: fixed;
        z-index: 50;
        pointer-events: none;
        background: #1a2030;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 8px 11px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--text-dim);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        max-width: 260px;
        opacity: 0;
        transition: opacity 90ms ease;
      }

      .tooltip.show {
        opacity: 1;
      }
      .tooltip .tip-title {
        color: var(--text);
        font-weight: 600;
      }
      .tooltip .tip-reason {
        color: var(--blocked);
      }
    </style>
  </head>
  <body>
    <div class="page-head">
      <h1>Compact agent dashboard — design variants</h1>
      <span class="sub"
        >statuses collapsed to running / blocked / done · hover any agent for details</span
      >
    </div>

    <div class="picker" id="picker"></div>
    <div class="stage" id="stage"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
      const now = Date.now();
      const min = 60_000;

      const agents = [
        {
          id: "a1",
          label: "refactor-auth",
          provider: "cursor",
          workspace: "webapp",
          status: "running",
          startedAt: now - 14 * min,
          updatedAt: now - 4_000,
        },
        {
          id: "a2",
          label: "fix-billing-tests",
          provider: "cursor",
          workspace: "webapp",
          status: "blocked",
          startedAt: now - 32 * min,
          updatedAt: now - 2 * min,
          reason: "Awaiting review of plan",
        },
        {
          id: "a3",
          label: "migrate-db-schema",
          provider: "claude",
          workspace: "api",
          status: "running",
          startedAt: now - 6 * min,
          updatedAt: now - 1_000,
        },
        {
          id: "a4",
          label: "docs-cleanup",
          provider: "cursor",
          workspace: "docs",
          status: "done",
          startedAt: now - 48 * min,
          updatedAt: now - 9 * min,
          completedAt: now - 9 * min,
        },
        {
          id: "a5",
          label: "perf-audit",
          provider: "claude",
          workspace: "webapp",
          status: "blocked",
          startedAt: now - 21 * min,
          updatedAt: now - 5 * min,
          reason: "Needs permission: rm -rf dist",
        },
        {
          id: "a6",
          label: "add-stream-deck",
          provider: "cursor",
          workspace: "hardware",
          status: "running",
          startedAt: now - 3 * min,
          updatedAt: now - 2_000,
        },
        {
          id: "a7",
          label: "bump-deps",
          provider: "cursor",
          workspace: "infra",
          status: "done",
          startedAt: now - 70 * min,
          updatedAt: now - 25 * min,
          completedAt: now - 25 * min,
        },
        {
          id: "a8",
          label: "triage-sentry",
          provider: "claude",
          workspace: "api",
          status: "running",
          startedAt: now - 55 * min,
          updatedAt: now - 8_000,
        },
      ];

      function rel(ts) {
        const s = Math.max(1, Math.round((now - ts) / 1000));
        if (s < 60) return s + "s ago";
        const m = Math.round(s / 60);
        if (m < 60) return m + "m ago";
        return Math.round(m / 60) + "h ago";
      }

      function runtime(a) {
        const end = a.completedAt ?? now;
        const m = Math.round((end - a.startedAt) / min);
        if (m < 1) return "<1m";
        if (m < 60) return m + "m";
        return Math.floor(m / 60) + "h " + (m % 60) + "m";
      }

      function initials(label) {
        const parts = label.split(/[-_ ]/).filter(Boolean);
        return (parts[0][0] + (parts[1]?.[0] ?? parts[0][1] ?? "")).toUpperCase();
      }

      const statusWord = { running: "Running", blocked: "Blocked", done: "Done" };

      function tipHtml(a) {
        return `
      <div class="tip-title">${a.label}</div>
      <div>${statusWord[a.status]} · ${a.provider}/${a.workspace}</div>
      <div>${a.status === "done" ? "ran for" : "running for"} ${runtime(a)} · updated ${rel(a.updatedAt)}</div>
      ${a.reason ? `<div class="tip-reason">${a.reason}</div>` : ""}
    `;
      }

      function el(tag, cls, html) {
        const node = document.createElement(tag);
        if (cls) node.className = cls;
        if (html !== undefined) node.innerHTML = html;
        return node;
      }

      function attachTip(node, agent) {
        node.dataset.agent = agent.id;
      }

      function tallyFoot() {
        const counts = { running: 0, blocked: 0, done: 0 };
        for (const a of agents) counts[a.status]++;
        return el(
          "div",
          "tally-foot",
          `
      <span class="t"><span class="dot" data-s="running"></span>${counts.running} running</span>
      <span class="t"><span class="dot" data-s="blocked"></span>${counts.blocked} blocked</span>
      <span class="t"><span class="dot" data-s="done"></span>${counts.done} done</span>
      <span class="conn"><span class="dot"></span>live</span>
    `,
        );
      }

      function makeWindow(bodyNode, withTally = true) {
        const win = el("div", "window");
        win.append(
          el(
            "div",
            "titlebar",
            `
      <span class="traffic"><span></span><span></span><span></span></span>
      <span class="name">agents</span>
      <span style="width:37px"></span>
    `,
          ),
        );
        const body = el("div", "body");
        body.append(bodyNode);
        win.append(body);
        if (withTally) win.append(tallyFoot());
        return win;
      }

      /* ---- V1: dense rows ---- */
      function buildV1() {
        const list = el("div", "v1-list");
        const order = { blocked: 0, running: 1, done: 2 };
        const sorted = [...agents].sort((x, y) => order[x.status] - order[y.status]);
        for (const a of sorted) {
          const row = el("div", "v1-row");
          row.dataset.s = a.status;
          const dotCls =
            a.status === "running" ? "dot pulse" : a.status === "blocked" ? "dot throb" : "dot";
          row.append(el("span", dotCls));
          row.lastChild.dataset.s = a.status;
          row.append(el("span", "label", a.label));
          if (a.reason) row.append(el("span", "reason", "— " + a.reason));
          row.append(el("span", "runtime", runtime(a)));
          attachTip(row, a);
          list.append(row);
        }
        return makeWindow(list);
      }

      /* ---- V2: grouped lanes ---- */
      function buildV2() {
        const wrap = el("div");
        const groups = [
          ["blocked", "Blocked"],
          ["running", "Running"],
          ["done", "Done"],
        ];
        for (const [key, title] of groups) {
          const members = agents.filter((a) => a.status === key);
          if (members.length === 0) continue;
          const head = el("div", "v2-lane-head");
          head.append(el("span", "dot"));
          head.lastChild.dataset.s = key;
          head.append(el("span", null, title));
          head.append(el("span", "n", String(members.length)));
          wrap.append(head);
          for (const a of members) {
            const item = el("div", "v2-item");
            item.dataset.s = a.status;
            item.append(el("span", "label", a.label));
            if (a.reason) item.append(el("span", "reason", a.reason));
            else item.append(el("span", "runtime", runtime(a)));
            attachTip(item, a);
            wrap.append(item);
          }
        }
        return makeWindow(wrap, false);
      }

      /* ---- V3: chip grid ---- */
      function buildV3() {
        const grid = el("div", "v3-grid");
        const order = { blocked: 0, running: 1, done: 2 };
        const sorted = [...agents].sort((x, y) => order[x.status] - order[y.status]);
        for (const a of sorted) {
          const chip = el("div", "v3-chip");
          chip.dataset.s = a.status;
          const dotCls =
            a.status === "running" ? "dot pulse" : a.status === "blocked" ? "dot throb" : "dot";
          chip.append(el("span", dotCls));
          chip.lastChild.dataset.s = a.status;
          chip.append(el("span", "label", a.label));
          attachTip(chip, a);
          grid.append(chip);
        }
        return makeWindow(grid);
      }

      /* ---- V4: tile matrix ---- */
      function buildV4() {
        const grid = el("div", "v4-grid");
        const order = { blocked: 0, running: 1, done: 2 };
        const sorted = [...agents].sort((x, y) => order[x.status] - order[y.status]);
        for (const a of sorted) {
          const tile = el("div", "v4-tile");
          tile.dataset.s = a.status;
          tile.append(el("span", null, initials(a.label)));
          tile.append(el("span", "who", a.label));
          attachTip(tile, a);
          grid.append(tile);
        }
        return makeWindow(grid);
      }

      /* ---- V5: statusbar / terminal ---- */
      function buildV5() {
        const body = el("div", "v5-body");
        const glyphs = { running: "▸", blocked: "■", done: "✓" };
        const order = { blocked: 0, running: 1, done: 2 };
        const sorted = [...agents].sort((x, y) => order[x.status] - order[y.status]);
        for (const a of sorted) {
          const row = el("div", "v5-row");
          row.dataset.s = a.status;
          row.append(el("span", "glyph", glyphs[a.status]));
          row.append(el("span", "label", a.label));
          if (a.reason) row.append(el("span", "reason", "· " + a.reason));
          row.append(el("span", "runtime", runtime(a)));
          attachTip(row, a);
          body.append(row);
        }
        return makeWindow(body);
      }

      const variants = [
        {
          id: "v1",
          title: "1 · Dense rows",
          note: "One line per agent, blocked sorted to the top with an inline reason and a red wash. Runtime on the right; everything else lives in the hover tooltip.",
          build: buildV1,
        },
        {
          id: "v2",
          title: "2 · Grouped lanes",
          note: "Agents grouped under tiny Blocked / Running / Done headers — the group counts double as the tally, so there's no separate summary anywhere.",
          build: buildV2,
        },
        {
          id: "v3",
          title: "3 · Chip grid",
          note: "Two-column chips with just a dot and a name. Blocked chips get a red ring and throbbing dot; done chips fade back. Details on hover.",
          build: buildV3,
        },
        {
          id: "v4",
          title: "4 · Tile matrix",
          note: "Maximum density: a colored tile per agent, initials up front. Whole tile is the status color, blocked tiles pulse. Best for lots of agents at a glance.",
          build: buildV4,
        },
        {
          id: "v5",
          title: "5 · Terminal list",
          note: "Monospace, tmux-flavored. One glyph per status (▸ running, ■ blocked, ✓ done), blocked reasons inline, runtime right-aligned.",
          build: buildV5,
        },
      ];

      /* ---- render stage + picker ---- */
      const stage = document.getElementById("stage");
      const picker = document.getElementById("picker");
      const frames = new Map();

      for (const v of variants) {
        const wrap = el("div", "frame-wrap");
        wrap.append(el("div", "frame-title", v.title));
        wrap.append(v.build());
        wrap.append(el("div", "frame-note", v.note));
        stage.append(wrap);
        frames.set(v.id, wrap);
      }

      const tabs = [{ id: "all", title: "All side by side" }, ...variants];
      let active = "all";

      function renderPicker() {
        picker.innerHTML = "";
        for (const t of tabs) {
          const b = el("button", t.id === active ? "active" : null, t.title);
          b.onclick = () => {
            active = t.id;
            apply();
          };
          picker.append(b);
        }
      }

      function apply() {
        for (const [id, frame] of frames) {
          frame.classList.toggle("visible", active === "all" || active === id);
        }
        renderPicker();
      }

      apply();

      /* ---- tooltip ---- */
      const tooltip = document.getElementById("tooltip");
      const byId = new Map(agents.map((a) => [a.id, a]));

      document.addEventListener("mouseover", (e) => {
        const target = e.target.closest("[data-agent]");
        if (!target) {
          tooltip.classList.remove("show");
          return;
        }
        tooltip.innerHTML = tipHtml(byId.get(target.dataset.agent));
        tooltip.classList.add("show");
      });

      document.addEventListener("mousemove", (e) => {
        if (!tooltip.classList.contains("show")) return;
        const pad = 14;
        let x = e.clientX + pad;
        let y = e.clientY + pad;
        const r = tooltip.getBoundingClientRect();
        if (x + r.width > innerWidth - 8) x = e.clientX - r.width - pad;
        if (y + r.height > innerHeight - 8) y = e.clientY - r.height - pad;
        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      });
    </script>
  </body>
</html>
